---
# General Information
jobname: continuous-flow2
type: "continuous" # differentiates between adding cars upfront or online
time: 1500
timestep: 1
seed: 70
logtype: "file"
highway-type: "cpu" # "cpu", "kokkos" or "metal".
road-end: 5000 # All lanes have a hard cutoff at 5000

# Driver Model
driverType: "Gipps" # driver type
driverParams:
  a: 1.981
  b: -2.8955
  bmax: -3.505
  p: 0.2

  # standard deviations to add heterogeneous traffic
  a_stdev: 0.1
  b_stdev: 0.1
  bmax_stdev: 0.1
  p_stdev: 0.02

#Lane must have Flow, start, end and index (position)
lanes:

  - 
    flow:
      rate: 300 # flow rate (veh/hr)
      v0: 0 # 0 represents all cars are starting from a standstill (stoplight case)
      vdes: 35 # all cars want to go 50 m/s

    # Start and end of lane. 
    start: 0
    end: 5000
    position: 0 # right lane 

