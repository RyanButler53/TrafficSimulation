---
# General Information
jobname: continuous-flow
type: "continuous" # differentiates between adding cars upfront or online
time: 1500
timestep: 1
seed: 70
logtype: "db"
highway-type: "cpu" # "cpu", "kokkos" or "metal".

# Driver Model
driverType: "Gipps" # driver type
driverParams:
  a: 1.981
  b: -2.8955
  bmax: -3.505
  p: 0.2

  # standard deviations to add heterogeneous traffic
  a_stdev: 0.1
  b_stdev: 0.1
  bmax_stdev: 0.1
  p_dist: 0.02

lanes:

  -
    flow:
      rate: 800 # flow rate (veh/hr)
      v0: 30 # 0 represents all cars are starting from a standstill (stoplight case)
      vdes: 45 # all cars want to go 35 m/s

    leadCar:
      leadType: "function"
      function:
        sine: # 3 arguments a sin(bx) + c 
          a: 5.0
          b: 0.04
          c: 40
      # vdes needed if car is no longer leader. 
      vdes: 45
      
      # Start and end of lane. 
      start: 0
      end: 5000

    index: 1 # 0 index = rightmost lane
  - 
    flow:
      rate: 700 # flow rate (veh/hr)
      v0: 0 # 0 represents all cars are starting from a standstill (stoplight case)
      vdes: 50 # all cars want to go 35 m/s

    leadCar:
      leadType: "constant"
      constant:
        velocity: 45
      vdes: 45
      
      # Start and end of lane. 
      start: 0
      end: 5000
    index: 0 # right labe. 

